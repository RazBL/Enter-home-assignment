<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
    <title>התחברות</title>
</head>

<body>
    <section class="d-flex justify-content-center align-items-center min-vh-100 px-3">
        <form id="loginForm" class="card p-4 align-items-center gap-4 auth-card">
            <h2>התחברות</h2>

            <div class="alert alert-info w-100 mb-0 text-center">
                משתמש לבדיקה: <strong>רז</strong><br>
                תעודת זהות: <strong>123456789</strong>
            </div>

            <input id="teacherName" class="form-control" type="text" placeholder="שם" required>
            <input id="teacherId" class="form-control" type="text" placeholder="תעודת זהות" required>

            <button type="submit" class="btn btn-primary w-100">
                התחברות
            </button>
        </form>
    </section>

    <script src="./js/auth.js"></script>
</body>

</html>
